name: xenia

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: xenia
      POSTGRES_PASSWORD: xenia
      POSTGRES_DB: xenia
    ports:
      # Host port 5442 (not 5432) to avoid clashing with other local Postgres
      # stacks. Container still listens on 5432 internally.
      - "5442:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xenia -d xenia"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      # Host port 6399 (not 6379) to avoid clashing with other local Redis stacks.
      - "6399:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- Observability stack (opt-in) ---------------------------------------
  # Heavier images. Start with: docker compose --profile observability up -d
  # so day-to-day DB/dev work never waits on the tracing tooling to pull/boot.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    profiles: ["observability"]
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:2.6.1
    profiles: ["observability"]
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200"

  grafana:
    image: grafana/grafana:11.4.0
    profiles: ["observability"]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
    ports:
      - "3001:3000"
    depends_on:
      - tempo

volumes:
  pgdata:
