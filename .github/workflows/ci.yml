name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  node:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: xenia
          POSTGRES_PASSWORD: xenia
          POSTGRES_DB: xenia
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U xenia" --health-interval 5s
          --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    env:
      DATABASE_URL: postgres://xenia_app:xenia_app@localhost:5432/xenia
      DATABASE_ADMIN_URL: postgres://xenia:xenia@localhost:5432/xenia
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm db:migrate
      - run: pnpm db:seed
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-concierge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: ruff check .
      - run: pytest -q

  # ai-eval:  gates merges on concierge quality (groundedness/escalation/tools).
  #   Wired once the dataset in tests/ai-eval is populated.
